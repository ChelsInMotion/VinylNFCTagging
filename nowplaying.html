<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Now Playing</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    color: #fff;
    font-family: 'Segoe UI', system-ui, sans-serif;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  #container {
    display: flex;
    align-items: center;
    gap: 56px;
    padding: 60px;
    max-width: 1800px;
    width: 100%;
    height: 100vh;
  }

  #art-wrap {
    flex-shrink: 0;
    width: 440px;
    height: 440px;
    border-radius: 12px;
    overflow: hidden;
    background: #1a1a1a;
    box-shadow: 0 30px 80px rgba(0,0,0,0.8);
  }

  #art {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: none;
  }

  #art-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #art-placeholder svg {
    width: 120px;
    height: 120px;
    opacity: 0.15;
  }

  #info {
    flex: 0 0 320px;
    min-width: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  #state-badge {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #888;
    margin-bottom: 24px;
  }

  #state-badge.playing { color: #1db954; }

  #track {
    font-size: 42px;
    font-weight: 700;
    line-height: 1.15;
    margin-bottom: 20px;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
  }

  #artist {
    font-size: 28px;
    font-weight: 500;
    color: #ccc;
    margin-bottom: 12px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  #album {
    font-size: 22px;
    font-weight: 400;
    color: #666;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Lyrics column */
  #lyrics-col {
    flex: 1;
    min-width: 0;
    height: calc(100vh - 120px);
    display: flex;
    flex-direction: column;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  #lyrics-col::before,
  #lyrics-col::after {
    content: '';
    position: absolute;
    left: 0; right: 0;
    height: 120px;
    pointer-events: none;
    z-index: 2;
  }
  #lyrics-col::before { top: 0; background: linear-gradient(to bottom, #0a0a0a, transparent); }
  #lyrics-col::after  { bottom: 0; background: linear-gradient(to top, #0a0a0a, transparent); }

  #lyrics-scroll {
    overflow: hidden;
    height: 100%;
    position: relative;
  }

  #lyrics-inner {
    transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    padding: 40vh 0;
  }

  .lyric-line {
    font-size: 26px;
    font-weight: 500;
    line-height: 1.6;
    color: #333;
    transition: color 0.4s ease, font-size 0.4s ease;
    padding: 4px 0;
    cursor: default;
    white-space: pre-wrap;
  }

  .lyric-line.active {
    color: #fff;
    font-size: 30px;
  }

  .lyric-line.past {
    color: #444;
  }

  /* Plain (un-timestamped) lyrics: readable, no highlight/scroll */
  .lyric-line.plain {
    color: #999;
  }

  #lyrics-empty {
    font-size: 18px;
    color: #333;
    font-style: italic;
  }

  #idle {
    text-align: center;
  }

  #idle .big {
    font-size: 80px;
    opacity: 0.08;
  }

  #idle .msg {
    font-size: 28px;
    color: #444;
    margin-top: 20px;
  }
</style>
</head>
<body>

<div id="container" style="display:none">
  <div id="art-wrap">
    <img id="art" alt="">
    <div id="art-placeholder">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1">
        <circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/>
        <line x1="12" y1="2" x2="12" y2="9"/><line x1="12" y1="15" x2="12" y2="22"/>
      </svg>
    </div>
  </div>
  <div id="info">
    <div id="state-badge">Now Playing</div>
    <div id="track">—</div>
    <div id="artist">—</div>
    <div id="album">—</div>
  </div>
  <div id="lyrics-col">
    <div id="lyrics-scroll">
      <div id="lyrics-inner">
        <div id="lyrics-empty" class="lyric-line">No lyrics found</div>
      </div>
    </div>
  </div>
</div>

<div id="idle">
  <div class="big">♫</div>
  <div class="msg">Waiting for music…</div>
</div>

<div id="debug" style="position:fixed;top:0;left:0;background:rgba(0,0,0,0.85);color:#0f0;font:14px monospace;padding:10px;white-space:pre;z-index:99;display:none;border-bottom-right-radius:8px"></div>

<script>
const params = new URLSearchParams(window.location.search);
const HA    = params.get('ha')    || 'http://192.168.1.220:8123';
const TOKEN = params.get('token') || '';
const MASS_ENTITY     = 'media_player.denon_avr_x4800h_3';
const SPOTIFY_ENTITY  = 'media_player.spotifyplus_chelsea';
// Sibling MA player that exposes a healthy playback clock while CASTING
// (e.g. Plexamp). During a cast the MA queue player (denon_3) reports a
// nonsense position (past the track end), so we borrow this one's clock.
const PLEX_CLOCK      = 'media_player.plex_music_assistant_music_assistant_plex';
// Players to watch, in priority order — the page DISPLAYS whichever is playing.
const ENTITIES = [MASS_ENTITY, SPOTIFY_ENTITY];
// Extra entities consulted ONLY for a healthy clock (position), best first.
const CLOCK_ENTITIES = [MASS_ENTITY, PLEX_CLOCK];
// Per-mode lyric offset (seconds; + = earlier). When the displayed player's
// own clock is healthy (vinyl / MA queue / direct), audio is ~in sync with
// the clock. When we have to BORROW a sibling clock (casting), the real audio
// is buffered well behind it, so we push the lyrics much later.
const LEAD_DIRECT = 1.0;
const LEAD_CAST   = -12.0;
// ?lead=N forces a fixed offset, overriding the per-mode value.
const MANUAL_LEAD = params.has('lead') ? parseFloat(params.get('lead')) : null;
let   activeLead  = LEAD_DIRECT;
// Add ?debug=1 to the URL to show a live readout in the top-left corner.
const DEBUG = params.has('debug');

const container    = document.getElementById('container');
const idle         = document.getElementById('idle');
const art          = document.getElementById('art');
const artPlaceholder = document.getElementById('art-placeholder');
const stateBadge   = document.getElementById('state-badge');
const trackEl      = document.getElementById('track');
const artistEl     = document.getElementById('artist');
const albumEl      = document.getElementById('album');
const lyricsInner  = document.getElementById('lyrics-inner');

let lyricsLines    = [];   // [{time, text}]
let lyricsSynced   = false;
let currentTrack   = '';
let currentArtist  = '';
let lyricEls       = [];
let activeIdx      = -1;

// Live playback position tracking (refreshed each poll, advanced by ticker)
let posBase = 0, posUpdatedAtMs = 0, isPlaying = false;
let lastEntity = '', lastState = '';
// Clock health (Option A/C): which entity's clock we're using, the mode, and
// whether it's usable at all. When unhealthy, lyrics show static (Option C).
let clockHealthy = true, clockMode = 'direct', clockEntity = '';
let staticShown = false;

const debugEl = document.getElementById('debug');
if (DEBUG && debugEl) debugEl.style.display = 'block';

async function fetchState(entity) {
  const res = await fetch(`${HA}/api/states/${entity}`, {
    headers: { 'Authorization': `Bearer ${TOKEN}` }
  });
  if (!res.ok) return null;
  return res.json();
}

// A playback clock is "sane" only if its position fits within the track.
// Casting makes the MA queue player report positions past the track end.
function clockSane(a) {
  const p = a.media_position, d = a.media_duration;
  return typeof p === 'number' && typeof d === 'number' && d > 0 && p >= -1 && p <= d + 2;
}
function sameTrack(a, title) {
  return !!title && (a.media_title || '') === title;
}

function parseLRC(lrc) {
  const lines = [];
  for (const raw of lrc.split('\n')) {
    const m = raw.match(/^\[(\d+):(\d+(?:\.\d+)?)\](.*)/);
    if (!m) continue;
    const time = parseInt(m[1]) * 60 + parseFloat(m[2]);
    const text = m[3].trim();
    lines.push({ time, text });
  }
  return lines.sort((a, b) => a.time - b.time);
}

// Returns {lines, synced} or null. Prefers a real synced version from
// lrclib (exact match first, then fuzzy search); only uses plain as a
// last resort and never fakes timestamps for it.
async function fetchLyrics(artist, track, album, duration) {
  try {
    let getUrl = `https://lrclib.net/api/get?artist_name=${encodeURIComponent(artist)}&track_name=${encodeURIComponent(track)}`;
    if (album)    getUrl += `&album_name=${encodeURIComponent(album)}`;
    if (duration) getUrl += `&duration=${Math.round(duration)}`;
    let res = await fetch(getUrl);
    let data = res.ok ? await res.json() : null;
    if (data && data.syncedLyrics) return { lines: parseLRC(data.syncedLyrics), synced: true };

    const searchUrl = `https://lrclib.net/api/search?artist_name=${encodeURIComponent(artist)}&track_name=${encodeURIComponent(track)}`;
    res = await fetch(searchUrl);
    const list = res.ok ? await res.json() : null;
    if (list && list.length) {
      for (const item of list) {
        if (item.syncedLyrics) return { lines: parseLRC(item.syncedLyrics), synced: true };
      }
      for (const item of list) {
        if (item.plainLyrics) return { lines: item.plainLyrics.split('\n').map(t => ({ time: null, text: t })), synced: false };
      }
    }
    if (data && data.plainLyrics) {
      return { lines: data.plainLyrics.split('\n').map(t => ({ time: null, text: t })), synced: false };
    }
  } catch (e) {}
  return null;
}

function renderLyrics(lines, synced) {
  lyricsInner.innerHTML = '';
  lyricEls = [];
  activeIdx = -1;

  if (!lines || lines.length === 0) {
    const el = document.createElement('div');
    el.className = 'lyric-line';
    el.textContent = 'No lyrics found';
    lyricsInner.appendChild(el);
    return;
  }

  for (const line of lines) {
    const el = document.createElement('div');
    // Plain (unsynced) lyrics render in a readable static color.
    el.className = synced ? 'lyric-line' : 'lyric-line plain';
    el.textContent = line.text || '';
    lyricsInner.appendChild(el);
    lyricEls.push(el);
  }
}

function scrollToLine(idx) {
  if (idx < 0 || idx >= lyricEls.length) return;
  const el = lyricEls[idx];
  const scrollEl = document.getElementById('lyrics-scroll');
  const scrollH = scrollEl.offsetHeight;
  const elTop = el.offsetTop;
  const elH = el.offsetHeight;
  const offset = elTop - (scrollH / 2) + (elH / 2) - 40 /* padding-top of inner */;
  lyricsInner.style.transform = `translateY(${-offset}px)`;
}

function updateActiveLineByTime(positionSec) {
  if (!lyricsSynced || !lyricsLines.length || !lyricEls.length) return;

  let idx = -1;
  for (let i = 0; i < lyricsLines.length; i++) {
    if (lyricsLines[i].time <= positionSec) idx = i;
    else break;
  }

  if (idx === activeIdx) return;
  activeIdx = idx;

  for (let i = 0; i < lyricEls.length; i++) {
    if (i < idx) lyricEls[i].className = 'lyric-line past';
    else if (i === idx) lyricEls[i].className = 'lyric-line active';
    else lyricEls[i].className = 'lyric-line';
  }
  scrollToLine(idx);
}

function currentPosition() {
  return posBase + (isPlaying ? (Date.now() - posUpdatedAtMs) / 1000 : 0) + activeLead;
}

// Smooth highlight ticker — advances the active line between polls so the
// highlight glides with the music instead of jumping every 3 seconds.
// When the clock is unhealthy (e.g. casting with no borrowable clock),
// freeze the lyrics in a readable static state instead of scrubbing wrong.
function showStaticLyrics() {
  if (staticShown) return;
  staticShown = true;
  activeIdx = -1;
  for (const el of lyricEls) el.className = 'lyric-line plain';
  lyricsInner.style.transform = 'translateY(0)';
}

setInterval(function () {
  const pos = currentPosition();
  if (lyricsSynced && clockHealthy) {
    staticShown = false;
    updateActiveLineByTime(pos);
  } else if (lyricsSynced) {
    showStaticLyrics();   // synced lyrics but no usable clock -> static (Option C)
  }
  if (DEBUG && debugEl) {
    const first = lyricsLines.length ? lyricsLines[0].time : '-';
    const last = lyricsLines.length ? lyricsLines[lyricsLines.length - 1].time.toFixed(1) : '-';
    debugEl.textContent =
      `display:  ${lastEntity}\n` +
      `clock:    ${clockEntity} [${clockMode}]\n` +
      `lead:     ${activeLead}  healthy:${clockHealthy}\n` +
      `state:    ${lastState}  playing:${isPlaying}\n` +
      `posBase:  ${posBase.toFixed(1)}\n` +
      `position: ${pos.toFixed(1)}\n` +
      `synced:   ${lyricsSynced}  lines:${lyricsLines.length}\n` +
      `activeIdx:${activeIdx}\n` +
      `lyricTimes: ${first} .. ${last}`;
  }
}, 200);

async function update() {
  try {
    // Read all candidate players and use whichever is actually playing
    // (prefer 'playing' over a stale 'paused'). This makes the page follow
    // Music Assistant, Spotify, Plex-via-MA — whatever is live right now.
    // Fetch every entity we might display OR borrow a clock from.
    const allEnts = ENTITIES.concat(CLOCK_ENTITIES).filter((e, i, a) => a.indexOf(e) === i);
    const byEnt = {};
    for (const ent of allEnts) {
      const s = await fetchState(ent);
      if (s) byEnt[ent] = { ent: ent, s: s, attrs: s.attributes || {} };
    }
    const snaps = ENTITIES.map(function (e) { return byEnt[e]; }).filter(Boolean);
    const chosen =
      snaps.find(function (x) { return x.s.state === 'playing' && x.attrs.media_title; }) ||
      snaps.find(function (x) { return x.s.state === 'paused'  && x.attrs.media_title; }) ||
      snaps.find(function (x) { return x.s.state === 'playing' || x.s.state === 'paused'; }) ||
      null;

    let data = chosen ? chosen.s : null;
    let attrs = chosen ? chosen.attrs : {};
    let usedEntity = chosen ? chosen.ent : '';
    if (!data) {
      container.style.display = 'none';
      idle.style.display = 'block';
      currentTrack = ''; currentArtist = ''; lyricsLines = []; lyricsSynced = false; isPlaying = false;
      lastEntity = ''; lastState = 'idle';
      return;
    }

    const state = data.state;
    lastEntity = usedEntity;
    lastState = state;

    if (state === 'playing' || state === 'paused') {
      container.style.display = 'flex';
      idle.style.display = 'none';

      stateBadge.textContent = state === 'playing' ? 'Now Playing' : 'Paused';
      stateBadge.className   = state === 'playing' ? 'playing' : '';

      const newTrack  = attrs.media_title  || '';
      const newArtist = attrs.media_artist || '';

      trackEl.textContent  = newTrack  || '—';
      artistEl.textContent = newArtist || '—';
      albumEl.textContent  = attrs.media_album_name || '—';

      if (attrs.entity_picture) {
        const artUrl = attrs.entity_picture.startsWith('http')
          ? attrs.entity_picture
          : `${HA}${attrs.entity_picture}`;
        if (art.src !== artUrl) {
          art.src = artUrl;
          art.style.display = 'block';
          artPlaceholder.style.display = 'none';
          art.onerror = () => {
            art.style.display = 'none';
            artPlaceholder.style.display = 'flex';
          };
        }
      } else {
        art.style.display = 'none';
        artPlaceholder.style.display = 'flex';
      }

      // --- Option A: choose the healthiest clock for THIS track ---
      // Prefer the displayed player's own clock; if it's missing/insane (the
      // cast quirk), borrow a sibling playing the same track with a sane
      // position. If nothing is usable, mark the clock unhealthy (-> static).
      let clk = null, borrowed = false;
      const clockCands = [usedEntity].concat(CLOCK_ENTITIES).filter((e, i, a) => a.indexOf(e) === i);
      for (const ent of clockCands) {
        const c = byEnt[ent];
        if (c && sameTrack(c.attrs, newTrack) && clockSane(c.attrs)) {
          clk = c; borrowed = (ent !== usedEntity); break;
        }
      }
      if (clk) {
        clockHealthy = true;
        clockEntity  = clk.ent;
        clockMode    = borrowed ? 'cast' : 'direct';
        posBase = clk.attrs.media_position || 0;
        posUpdatedAtMs = clk.attrs.media_position_updated_at
          ? Date.parse(clk.attrs.media_position_updated_at)
          : Date.now();
        isPlaying = (state === 'playing');
        activeLead = (MANUAL_LEAD !== null) ? MANUAL_LEAD
                                            : (borrowed ? LEAD_CAST : LEAD_DIRECT);
      } else {
        clockHealthy = false;      // Option C: no usable clock -> static lyrics
        clockEntity  = '(none)';
        clockMode    = 'static';
        isPlaying    = false;
      }

      // Fetch lyrics when the track changes. Keep the current lyrics on
      // screen until the new ones arrive, so there's no blank flash.
      if (newTrack !== currentTrack || newArtist !== currentArtist) {
        currentTrack  = newTrack;
        currentArtist = newArtist;
        lyricsSynced  = false;   // pause highlighting during the fetch
        activeIdx     = -1;

        if (newTrack && newArtist) {
          const result = await fetchLyrics(newArtist, newTrack, attrs.media_album_name, attrs.media_duration);
          lyricsLines  = result ? result.lines : [];
          lyricsSynced = result ? result.synced : false;
          renderLyrics(lyricsLines, lyricsSynced);
        } else {
          lyricsLines = [];
          renderLyrics(null, false);
        }
      }

    } else {
      container.style.display = 'none';
      idle.style.display = 'block';
      currentTrack  = '';
      currentArtist = '';
      lyricsLines   = [];
      lyricsSynced  = false;
      isPlaying     = false;
    }
  } catch (e) {
    // silently retry
  }
}

update();
setInterval(update, 3000);
</script>
</body>
</html>
