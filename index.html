<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Now Playing</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    background: #0a0a0a;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: Georgia, serif;
  }
  .container {
    text-align: center;
    padding: 2rem;
    max-width: 480px;
    width: 100%;
  }

  /* Now playing styles */
  .label {
    font-family: monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: #c0392b;
    text-transform: uppercase;
    margin-bottom: 2.5rem;
  }
  .vinyl-wrap {
    position: relative;
    width: 240px;
    height: 240px;
    margin: 0 auto 2.5rem;
  }
  .vinyl {
    width: 240px;
    height: 240px;
    animation: spin 8s linear infinite;
    will-change: transform;
    -webkit-animation: spin 8s linear infinite;
  }
  .tonearm {
    position: absolute;
    top: 0;
    left: 0;
    width: 240px;
    height: 240px;
    pointer-events: none;
  }
  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
  @-webkit-keyframes spin {
    from { -webkit-transform: rotate(0deg); }
    to { -webkit-transform: rotate(360deg); }
  }
  .artist {
    font-family: monospace;
    font-size: 12px;
    letter-spacing: 0.15em;
    color: #666;
    text-transform: uppercase;
    margin-bottom: 0.75rem;
  }
  .album {
    font-size: 1.8rem;
    color: #f0ece4;
    line-height: 1.15;
    margin-bottom: 2.5rem;
  }
  .divider {
    width: 40px;
    height: 1px;
    background: #222;
    margin: 0 auto 2rem;
  }
  .status {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #444;
  }
  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #c0392b;
    animation: blink 1.4s ease-in-out infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }

  /* Lyrics */
  .lyrics {
    margin-top: 2.5rem;
    max-height: 230px;
    overflow: hidden;
    position: relative;
    font-family: Georgia, serif;
    font-size: 1.1rem;
    line-height: 2;
    -webkit-mask-image: linear-gradient(to bottom, transparent 0%, #000 22%, #000 78%, transparent 100%);
    mask-image: linear-gradient(to bottom, transparent 0%, #000 22%, #000 78%, transparent 100%);
  }
  .lyrics-inner {
    transition: transform 0.45s cubic-bezier(0.4, 0, 0.2, 1);
    will-change: transform;
  }
  .lyric-line {
    color: #8a8a8a;
    opacity: 0.65;
    transition: color 0.35s ease, opacity 0.35s ease;
    padding: 0 0.5rem;
  }
  .lyric-line.passed {
    color: #5a5a5a;
    opacity: 0.4;
  }
  .lyric-line.active {
    color: #f0ece4;
    opacity: 1;
  }
  /* Plain (un-timed) lyrics: readable, no highlighting */
  .lyrics.static .lyric-line {
    color: #d8d2c8;
    opacity: 1;
  }

  /* Error styles */
  .error-img {
    width: 100%;
    max-width: 400px;
    border-radius: 8px;
  }
</style>
</head>
<body>
<div class="container" id="now-playing" style="display:none">
  <div class="label">Now playing on Denon AVR-X4800H</div>
  <div class="vinyl-wrap">
    <!-- Spinning record -->
    <svg class="vinyl" viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="shimmer" cx="35%" cy="30%" r="65%">
          <stop offset="0%" stop-color="#ffffff" stop-opacity="0.08"/>
          <stop offset="50%" stop-color="#ffffff" stop-opacity="0"/>
          <stop offset="100%" stop-color="#000000" stop-opacity="0.15"/>
        </radialGradient>
        <clipPath id="label-clip">
          <circle cx="80" cy="80" r="24"/>
        </clipPath>
      </defs>
      <!-- Record base -->
      <circle cx="80" cy="80" r="78" fill="#1a1a1a" stroke="#333" stroke-width="1.5"/>
      <!-- Grooves — more contrast -->
      <circle cx="80" cy="80" r="72" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
      <circle cx="80" cy="80" r="66" fill="none" stroke="#262626" stroke-width="1"/>
      <circle cx="80" cy="80" r="60" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
      <circle cx="80" cy="80" r="54" fill="none" stroke="#262626" stroke-width="1"/>
      <circle cx="80" cy="80" r="48" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
      <circle cx="80" cy="80" r="42" fill="none" stroke="#262626" stroke-width="1"/>
      <circle cx="80" cy="80" r="36" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
      <circle cx="80" cy="80" r="30" fill="none" stroke="#333" stroke-width="1"/>
      <!-- Label (red fallback, replaced by album art if provided) -->
      <circle cx="80" cy="80" r="24" fill="#c0392b" id="label-bg"/>
      <image id="label-art" x="56" y="56" width="48" height="48" clip-path="url(#label-clip)" preserveAspectRatio="xMidYMid slice" style="display:none"/>
      <circle cx="80" cy="80" r="5" fill="#0a0a0a"/>
      <!-- Shimmer highlight -->
      <circle cx="80" cy="80" r="78" fill="url(#shimmer)"/>
    </svg>
    <!-- Tonearm (static, sits on top) -->
    <svg class="tonearm" viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
      <!-- Pivot point -->
      <circle cx="138" cy="22" r="5" fill="#888" stroke="#555" stroke-width="1"/>
      <!-- Arm -->
      <line x1="138" y1="22" x2="105" y2="72" stroke="#999" stroke-width="2.5" stroke-linecap="round"/>
      <!-- Headshell angle -->
      <line x1="105" y1="72" x2="95" y2="82" stroke="#888" stroke-width="2" stroke-linecap="round"/>
      <!-- Stylus tip -->
      <circle cx="94" cy="83" r="2" fill="#c0392b"/>
    </svg>
  </div>
  <div class="artist" id="artist"></div>
  <div class="album" id="album"></div>
  <div class="divider"></div>
  <div class="status">
    <div class="dot"></div>
    Playing now
  </div>
  <div class="lyrics" id="lyrics" style="display:none">
    <div class="lyrics-inner" id="lyrics-inner"></div>
  </div>
</div>

<div class="container" id="error" style="display:none">
  <img class="error-img" src="error.jpg" alt="Technical Difficulties — Please Stand By">
</div>

<script>
  var pageLoadTime = performance.now ? performance.now() : 0;

  document.addEventListener('visibilitychange', function() {
    if (!document.hidden) {
      var vinyl = document.querySelector('.vinyl');
      if (vinyl) {
        vinyl.style.animation = 'none';
        vinyl.offsetHeight; // force reflow
        vinyl.style.animation = '';
      }
    }
  });

  // Parse LRC-style timestamped lyrics. Returns array of {time, text}.
  // Lines look like "[01:23.45]some words" (centiseconds optional).
  // Returns null if no timestamps are found (plain lyrics).
  function parseLRC(raw) {
    var lines = raw.replace(/\r/g, '').split('\n');
    var out = [];
    var re = /\[(\d{1,2}):(\d{2})(?:[.:](\d{1,3}))?\]/g;
    for (var i = 0; i < lines.length; i++) {
      var line = lines[i];
      var stamps = [];
      var m;
      re.lastIndex = 0;
      while ((m = re.exec(line)) !== null) {
        var min = parseInt(m[1], 10);
        var sec = parseInt(m[2], 10);
        var frac = m[3] ? parseFloat('0.' + m[3]) : 0;
        stamps.push(min * 60 + sec + frac);
      }
      var text = line.replace(re, '').trim();
      for (var s = 0; s < stamps.length; s++) {
        out.push({ time: stamps[s], text: text });
      }
    }
    if (!out.length) return null;
    out.sort(function(a, b) { return a.time - b.time; });
    return out;
  }

  function setupLyrics(raw, startAt) {
    var box = document.getElementById('lyrics');
    var inner = document.getElementById('lyrics-inner');
    box.style.display = 'block';

    var timed = parseLRC(raw);

    if (!timed) {
      // Plain lyrics — display them cleanly, no syncing possible.
      box.classList.add('static');
      var plain = raw.replace(/\r/g, '').split('\n');
      for (var i = 0; i < plain.length; i++) {
        var d = document.createElement('div');
        d.className = 'lyric-line';
        d.textContent = plain[i].trim() || ' ';
        inner.appendChild(d);
      }
      return;
    }

    // Timed lyrics — build elements and sync to elapsed playback time.
    var els = [];
    for (var j = 0; j < timed.length; j++) {
      var el = document.createElement('div');
      el.className = 'lyric-line';
      el.textContent = timed[j].text || ' ';
      inner.appendChild(el);
      els.push(el);
    }

    var t0 = (window.performance && performance.now) ? performance.now() : Date.now();
    var current = -1;

    function tick() {
      var now = (window.performance && performance.now) ? performance.now() : Date.now();
      var elapsed = (now - t0) / 1000 + startAt;

      // Find the last line whose timestamp has passed.
      var idx = -1;
      for (var k = 0; k < timed.length; k++) {
        if (timed[k].time <= elapsed) idx = k; else break;
      }

      if (idx !== current) {
        current = idx;
        for (var n = 0; n < els.length; n++) {
          els[n].className = 'lyric-line' +
            (n < idx ? ' passed' : (n === idx ? ' active' : ''));
        }
        // Center the active line within the lyrics window.
        if (idx >= 0) {
          var active = els[idx];
          var offset = box.clientHeight / 2 - (active.offsetTop + active.offsetHeight / 2);
          inner.style.transform = 'translateY(' + offset + 'px)';
        }
      }
      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  }

  var params = new URLSearchParams(window.location.search);
  var artist = params.get('artist');
  var album = params.get('album');
  var track = params.get('track');   // song title (for lyrics lookup)
  var dur = parseFloat(params.get('dur')) || 0;
  var webhook = params.get('webhook');
  var art = params.get('art');
  var lyrics = params.get('lyrics');
  var startAt = parseFloat(params.get('t')) || 0;

  if (artist && album) {
    document.getElementById('artist').textContent = artist;
    document.getElementById('album').textContent = album;
    document.getElementById('now-playing').style.display = 'block';

    if (art) {
      var labelArt = document.getElementById('label-art');
      var labelBg = document.getElementById('label-bg');
      labelArt.setAttribute('href', art);
      labelArt.style.display = '';
      labelBg.style.display = 'none';
    }

    if (lyrics) {
      // Manual override (lyrics= param still works as a fallback).
      setupLyrics(lyrics, startAt);
    } else if (track) {
      // Fetch synced lyrics from lrclib.net directly in the browser.
      // This keeps the HA URL short (no encoded lyrics), and lets us
      // compensate for the time spent loading + fetching.
      var lrcUrl = 'https://lrclib.net/api/get' +
        '?artist_name=' + encodeURIComponent(artist || '') +
        '&track_name=' + encodeURIComponent(track) +
        (album ? '&album_name=' + encodeURIComponent(album) : '') +
        (dur ? '&duration=' + Math.round(dur) : '');
      fetch(lrcUrl)
        .then(function(r) { return r.ok ? r.json() : null; })
        .then(function(data) {
          if (!data) return;
          var lrc = data.syncedLyrics || data.plainLyrics;
          if (!lrc) return;
          // Add time elapsed since page load so lyrics land in sync.
          var elapsed = startAt + ((performance.now ? performance.now() : pageLoadTime) - pageLoadTime) / 1000;
          setupLyrics(lrc, elapsed);
        })
        .catch(function() {});
    }

    // Optionally fire a webhook on load (only if one was supplied).
    if (webhook) {
      window.addEventListener('load', function() {
        setTimeout(function() {
          fetch('https://hooks.nabu.casa/' + webhook, {
            method: 'POST',
            mode: 'no-cors'
          }).catch(function() {});
        }, 500);
      });
    }
  } else {
    document.getElementById('error').style.display = 'block';
  }
</script>
</body>
</html>
