<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Now Playing</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    background: #0a0a0a;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: Georgia, serif;
  }
  .container {
    text-align: center;
    padding: 2rem;
    max-width: 480px;
    width: 100%;
  }

  /* Now playing styles */
  .label {
    font-family: monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: #c0392b;
    text-transform: uppercase;
    margin-bottom: 2.5rem;
  }
  .vinyl-wrap {
    position: relative;
    width: 240px;
    height: 240px;
    margin: 0 auto 2.5rem;
  }
  .vinyl {
    width: 240px;
    height: 240px;
    animation: spin 8s linear infinite;
    will-change: transform;
    -webkit-animation: spin 8s linear infinite;
  }
  .tonearm {
    position: absolute;
    top: 0;
    left: 0;
    width: 240px;
    height: 240px;
    pointer-events: none;
  }
  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
  @-webkit-keyframes spin {
    from { -webkit-transform: rotate(0deg); }
    to { -webkit-transform: rotate(360deg); }
  }
  .artist {
    font-family: monospace;
    font-size: 12px;
    letter-spacing: 0.15em;
    color: #666;
    text-transform: uppercase;
    margin-bottom: 0.75rem;
  }
  .album {
    font-size: 1.8rem;
    color: #f0ece4;
    line-height: 1.15;
    margin-bottom: 2.5rem;
  }
  .divider {
    width: 40px;
    height: 1px;
    background: #222;
    margin: 0 auto 2rem;
  }
  .status {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #444;
  }
  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #c0392b;
    animation: blink 1.4s ease-in-out infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }

  /* Error styles */
  .error-img {
    width: 100%;
    max-width: 400px;
    border-radius: 8px;
  }
</style>
</head>
<body>
<div class="container" id="now-playing" style="display:none">
  <div class="label">Now playing on Denon AVR-X4800H</div>
  <div class="vinyl-wrap">
    <!-- Spinning record -->
    <svg class="vinyl" viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="shimmer" cx="35%" cy="30%" r="65%">
          <stop offset="0%" stop-color="#ffffff" stop-opacity="0.08"/>
          <stop offset="50%" stop-color="#ffffff" stop-opacity="0"/>
          <stop offset="100%" stop-color="#000000" stop-opacity="0.15"/>
        </radialGradient>
        <clipPath id="label-clip">
          <circle cx="80" cy="80" r="24"/>
        </clipPath>
      </defs>
      <!-- Record base -->
      <circle cx="80" cy="80" r="78" fill="#1a1a1a" stroke="#333" stroke-width="1.5"/>
      <!-- Grooves — more contrast -->
      <circle cx="80" cy="80" r="72" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
      <circle cx="80" cy="80" r="66" fill="none" stroke="#262626" stroke-width="1"/>
      <circle cx="80" cy="80" r="60" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
      <circle cx="80" cy="80" r="54" fill="none" stroke="#262626" stroke-width="1"/>
      <circle cx="80" cy="80" r="48" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
      <circle cx="80" cy="80" r="42" fill="none" stroke="#262626" stroke-width="1"/>
      <circle cx="80" cy="80" r="36" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
      <circle cx="80" cy="80" r="30" fill="none" stroke="#333" stroke-width="1"/>
      <!-- Label (red fallback, replaced by album art if provided) -->
      <circle cx="80" cy="80" r="24" fill="#c0392b" id="label-bg"/>
      <image id="label-art" x="56" y="56" width="48" height="48" clip-path="url(#label-clip)" preserveAspectRatio="xMidYMid slice" style="display:none"/>
      <circle cx="80" cy="80" r="5" fill="#0a0a0a"/>
      <!-- Shimmer highlight -->
      <circle cx="80" cy="80" r="78" fill="url(#shimmer)"/>
    </svg>
    <!-- Tonearm (static, sits on top) -->
    <svg class="tonearm" viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
      <!-- Pivot point -->
      <circle cx="138" cy="22" r="5" fill="#888" stroke="#555" stroke-width="1"/>
      <!-- Arm -->
      <line x1="138" y1="22" x2="105" y2="72" stroke="#999" stroke-width="2.5" stroke-linecap="round"/>
      <!-- Headshell angle -->
      <line x1="105" y1="72" x2="95" y2="82" stroke="#888" stroke-width="2" stroke-linecap="round"/>
      <!-- Stylus tip -->
      <circle cx="94" cy="83" r="2" fill="#c0392b"/>
    </svg>
  </div>
  <div class="artist" id="artist"></div>
  <div class="album" id="album"></div>
  <div class="divider"></div>
  <div class="status">
    <div class="dot"></div>
    Playing now
  </div>
</div>

<div class="container" id="error" style="display:none">
  <img class="error-img" src="error.jpg" alt="Technical Difficulties — Please Stand By">
</div>

<script>
  document.addEventListener('visibilitychange', function() {
    if (!document.hidden) {
      var vinyl = document.querySelector('.vinyl');
      if (vinyl) {
        vinyl.style.animation = 'none';
        vinyl.offsetHeight; // force reflow
        vinyl.style.animation = '';
      }
    }
  });

  var params = new URLSearchParams(window.location.search);
  var artist = params.get('artist');
  var album = params.get('album');
  var webhook = params.get('webhook');
  var art = params.get('art');

  if (artist && album && webhook) {
    document.getElementById('artist').textContent = artist;
    document.getElementById('album').textContent = album;
    document.getElementById('now-playing').style.display = 'block';

    if (art) {
      var labelArt = document.getElementById('label-art');
      var labelBg = document.getElementById('label-bg');
      labelArt.setAttribute('href', art);
      labelArt.style.display = '';
      labelBg.style.display = 'none';
    }

    window.addEventListener('load', function() {
      setTimeout(function() {
        fetch('https://hooks.nabu.casa/' + webhook, {
          method: 'POST',
          mode: 'no-cors'
        }).catch(function() {});
      }, 500);
    });
  } else {
    document.getElementById('error').style.display = 'block';
  }
</script>
</body>
</html>
